<!DOCTYPE html>
<html>
<head>
    <title>Women Safety Analytics - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border: 2px solid black;
        }

        h2 {
            text-align: center;
        }

        input[type=email],
        input[type=password] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        input[type=submit] {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
        }

        p {
            text-align: center;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Women Safety Analytics</h2>

    <form>
        <label>Email Address</label>
        <input type="email" placeholder="Enter Email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter Password" required>

        <input type="submit" value="Login">
    </form>

    <p><a href="#">Forgot Password?</a></p>
    <p>New User? <a href="#">Register Here</a></p>
    <p><a href="#">Admin Login</a></p>
</div>

</body>
          </html>
