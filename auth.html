<!DOCTYPE html>
<html>
<head>
    <title>Women Safety Analytics - Authentication</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
        }

        .container{
            width:350px;
            margin:50px auto;
            padding:20px;
            background:white;
            border:2px solid black;
            border-radius:10px;
        }

        h2{
            text-align:center;
            color:#e91e63;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
            background:#e91e63;
            color:white;
            border:none;
            cursor:pointer;
        }

        p{
            text-align:center;
        }

        a{
            text-decoration:none;
        }
    </style>
</head>
<body>

<!-- Registration Form -->
<div class="container">
    <h2>User Registration</h2>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter Full Name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter Email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Register</button>
    </form>
</div>

<!-- Login Form -->
<div class="container">
    <h2>User Login</h2>

    <form>
        <label>Email</label>
        <input type="email" placeholder="Enter Email" required>

        <label>Password</label>
        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

    <p><a href="#">Forgot Password?</a></p>
</div>

</body>
  </html>
